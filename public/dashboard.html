<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kordowski Logistic - Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f8ff;
}

.topbar {
    background: #0b63ff;
    color: white;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.sidebar {
    position: fixed;
    top: 60px;
    left: 0;
    width: 220px;
    height: calc(100vh - 60px);
    background: #0f1c3f;
    color: white;
    padding-top: 20px;
}

.sidebar a {
    display: block;
    color: white;
    padding: 12px 20px;
    text-decoration: none;
}

.sidebar a:hover {
    background: #1d4ed8;
}

.content {
    margin-left: 220px;
    padding: 30px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button {
    background: white;
    color: #0b63ff;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="topbar">
    <h3>Kordowski Logistic</h3>
    <button onclick="logout()">Wyloguj</button>
</div>

<div class="sidebar">
    <a href="/dashboard.html">🏠 Dashboard</a>
    <a href="/cmr.html">📄 CMR</a>
    <a href="/drivers.html">🚛 Kierowcy</a>
    <a href="/payments.html">💰 Rozliczenia</a>
</div>

<div class="content">
    <div class="card">
        <h2>Dashboard</h2>
        <p>System działa poprawnie ✔</p>
    </div>
</div>

<script>
if (!localStorage.getItem("token")) {
    window.location.href = "/";
}

function logout() {
    localStorage.removeItem("token");
    localStorage.removeItem("role");
    window.location.href = "/";
}
</script>

</body>
</html>
