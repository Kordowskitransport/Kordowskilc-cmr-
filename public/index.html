<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Login - Kordowski Logistic</title>
</head>
<body style="margin:0; font-family:Arial; background:#0b1220; color:white;">

<div style="display:flex; height:100vh;">

    <div style="flex:1; background:linear-gradient(135deg,#1e90ff,#00c3ff); display:flex; justify-content:center; align-items:center; flex-direction:column;">
        <h1>Kordowski Logistic</h1>
        <p>System transportowy</p>
    </div>

    <div style="flex:1; display:flex; justify-content:center; align-items:center;">

        <div style="background:#111a2e; padding:40px; border-radius:12px; width:300px;">
            <h2>Logowanie</h2>

            <input id="email" placeholder="Email" style="width:100%; padding:10px; margin:10px 0;"><br>
            <input id="password" type="password" placeholder="Hasło" style="width:100%; padding:10px; margin:10px 0;"><br>

            <button onclick="login()" style="width:100%; padding:10px; background:#1e90ff; color:white; border:none;">
                Zaloguj
            </button>

            <p id="msg"></p>
        </div>

    </div>

</div>

<script>
async function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/api/login", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({email,password})
    });

    const data = await res.json();

    const msg = document.getElementById("msg");

    if(!res.ok){
        msg.innerText = data.message;
        return;
    }

    localStorage.setItem("token", data.token);
    msg.style.color = "lightgreen";
    msg.innerText = "Zalogowano!";
}
</script>

</body>
</html>
