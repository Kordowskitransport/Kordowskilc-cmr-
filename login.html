<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kordowski Logistic - Login</title>

<link rel="stylesheet" href="/css/login.css">
</head>

<body>

<div class="login-container">

    <div class="box">

        <div class="logo">

        <p id="msg"></p>

    </div>

</div>

<script src="/js/login.js"></script>

</body>
</html>
